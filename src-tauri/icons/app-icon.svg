<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- มากกว่าเดิม: ใช้สีที่สดและอิ่มตัวมากขึ้น (Vibrant Cyan to Deep Blue) -->
    <linearGradient id="gradVibrant" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F2FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FACFE;stop-opacity:1" />
    </linearGradient>
    
    <!-- เพิ่มเงาและแสงเรืองเพื่อให้ดูมีมิติชัดเจน -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Glow: เพิ่มความเข้มขึ้นเพื่อให้ icon ดูลอยออกมา -->
  <circle cx="512" cy="512" r="420" fill="url(#gradVibrant)" opacity="0.25" filter="url(#glow)" />
  
  <!-- Back Glass Plate: ปรับความชัดของขอบกระจกด้านหลัง -->
  <path d="M300 200 L724 200 L650 512 L724 824 L300 824 L374 512 Z" fill="white" opacity="0.15" stroke="white" stroke-width="3" />
  
  <!-- Main Hourglass Body: เพิ่มความโปร่งแสงแต่ขอบชัด (Glassmorphism look) -->
  <path d="M350 250 L674 250 L600 512 L674 774 L350 774 L424 512 Z" fill="white" opacity="0.25" stroke="white" stroke-width="6" filter="url(#shadow)" />
  
  <!-- Top and Bottom Caps: ปรับให้เข้มขึ้นและดูหนาขึ้น -->
  <rect x="320" y="170" width="384" height="50" rx="12" fill="white" opacity="0.6" stroke="white" stroke-width="2" />
  <rect x="320" y="804" width="384" height="50" rx="12" fill="white" opacity="0.6" stroke="white" stroke-width="2" />
  
  <!-- Sand Content: ใช้สีที่สดขึ้นมาก (100% Opacity) และเพิ่มแสงเรือง -->
  <path d="M424 512 L600 512 L660 740 L364 740 Z" fill="url(#gradVibrant)" filter="url(#glow)" />
  
  <!-- Falling Sand: ทำให้เห็นชัดเจนขึ้น -->
  <rect x="506" y="480" width="12" height="60" fill="url(#gradVibrant)" opacity="0.8" />
  
  <!-- Light Reflections: เพิ่มประกายเงาให้ดูเหมือนกระจกจริง -->
  <path d="M380 280 L450 280 L420 450 Z" fill="white" opacity="0.3" />
  <path d="M600 280 L640 280 L610 350 Z" fill="white" opacity="0.2" />
</svg>
